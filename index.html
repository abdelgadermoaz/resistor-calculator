<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modular Resistor Calculator</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <h1>Resistor Color Code Calculator</h1>

    <div class="calculator-section" id="calc4-container">
        <h2>Four Band Resistors</h2>
        <div class="band-container">
            <div class="band-group">
                <label>Band 1</label>
                <select>
                    <option value="brown" selected>Brown</option>
                    <option value="red">Red</option>
                    <option value="orange">Orange</option>
                    <option value="yellow">Yellow</option>
                    <option value="green">Green</option>
                    <option value="blue">Blue</option>
                    <option value="violet">Violet</option>
                    <option value="gray">Gray</option>
                    <option value="white">White</option>
                </select>
            </div>
            <div class="band-group">
                <label>Band 2</label>
                <select>
                    <option value="black" selected>Black</option>
                    <option value="brown">Brown</option>
                    <option value="red">Red</option>
                    <option value="orange">Orange</option>
                    <option value="yellow">Yellow</option>
                    <option value="green">Green</option>
                    <option value="blue">Blue</option>
                    <option value="violet">Violet</option>
                    <option value="gray">Gray</option>
                    <option value="white">White</option>
                </select>
            </div>
            <div class="band-group">
                <label>Multiplier</label>
                <select>
                    <option value="black">Black</option>
                    <option value="brown">Brown</option>
                    <option value="red" selected>Red</option>
                    <option value="orange">Orange</option>
                    <option value="yellow">Yellow</option>
                    <option value="green">Green</option>
                    <option value="blue">Blue</option>
                    <option value="gold">Gold</option>
                    <option value="silver">Silver</option>
                </select>
            </div>
            <div class="band-group">
                <label>Tolerance</label>
                <select>
                    <option value="brown">Brown (±1%)</option>
                    <option value="red">Red (±2%)</option>
                    <option value="gold" selected>Gold (±5%)</option>
                    <option value="silver">Silver (±10%)</option>
                </select>
            </div>
        </div>
        <div class="result" id="res-calc4">Resistance: ...</div>
    </div>

    <div class="calculator-section" id="calc5-container">
        <h2>Five Band Resistors</h2>
        <div class="band-container">
            <div class="band-group">
                <label>Band 1</label>
                <select><option value="brown" selected>Brown</option><option value="red">Red</option><option value="orange">Orange</option></select>
            </div>
            <div class="band-group">
                <label>Band 2</label>
                <select><option value="black">Black</option><option value="red" selected>Red</option><option value="orange">Orange</option></select>
            </div>
            <div class="band-group">
                <label>Band 3</label>
                <select><option value="black">Black</option><option value="red" selected>Red</option><option value="orange">Orange</option></select>
            </div>
            <div class="band-group">
                <label>Multiplier</label>
                <select><option value="red">Red</option><option value="orange">Orange</option><option value="yellow" selected>Yellow</option></select>
            </div>
            <div class="band-group">
                <label>Tolerance</label>
                <select><option value="gold" selected>Gold</option><option value="brown">Brown</option></select>
            </div>
        </div>
        <div class="result" id="res-calc5">Resistance: ...</div>
    </div>

    <script type="module" src="js/app.js"></script>
</body>
</html>
